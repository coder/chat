services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:54329:5432"
    environment:
      POSTGRES_DB: chat_sdk_go
      POSTGRES_USER: chat_sdk_go
      POSTGRES_PASSWORD: chat_sdk_go
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_sdk_go -d chat_sdk_go"]
      interval: 2s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.2-alpine
    ports:
      - "127.0.0.1:63799:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  postgres-data:
  redis-data:
